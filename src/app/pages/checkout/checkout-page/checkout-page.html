<div class="container mt-2">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-6">

            <h6 class="mb-3">
                Your item ({{ CartData?.length ?? 0 }})
            </h6>

            <!-- Item Card -->
            @for (data of CartData; track data) {
                <div class="card list-item mb-2">
                    <div class="card-body d-flex justify-content-between">

                        <div class="d-flex align-items-end gap-2">
                            <img class="item-image" [src]="data.image" alt="ticket" />
                            <div>
                                <div class="fw-semibold">{{ data.name }}</div>
                                <small class="text-muted">
                                    ${{ data.price }}
                                </small>
                            </div>
                        </div>

                        <div class="d-flex align-items-end gap-2">
                            <button class="btn btn-light btn-sm btn-decrease" (click)="decrease(data)">-</button>

                            <input type="number" readonly="true" class="form-control text-center qty-input" [value]="data.qty"
                                (input)="onQtyChange($event, data)" min="0" />

                            <button class="btn btn-light btn-sm btn-increase" (click)="increase(data)">+</button>
                        </div>

                    </div>
                </div>
            }

            <!-- Payment Method -->
            <h6 class="mb-2">Payment method</h6>

            <div class="list-group payment_method">
                @for (p_method of payment_method; track p_method) {
                    <button class="list-group-item list-group-item-action d-flex align-items-center gap-2"
                        [class.active]="p_method === selectedMethod" (click)="selectPaymentMethod(p_method)">

                        <img [src]="p_method.image" />
                        <span>{{ p_method.name }}</span>
                    </button>
                }
            </div>

            <!-- Summary -->
            <hr class="line-dashed">

            <div class="price-summary">
                <div class="price-row subtotal">
                    <span class="label">Subtotal</span>
                    <span class="value">
                        ${{ totalPrice() | number:'1.2-2' }}
                    </span>
                </div>

                <div class="price-row tax">
                    <span class="label">Taxes</span>
                    <span class="value">$0.00</span>
                </div>

                <div class="divider"></div>

                <div class="price-row total">
                    <span class="label">Total</span>
                    <span class="value">
                        ${{ totalPrice() | number:'1.2-2' }}
                    </span>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Bottom Cart Bar -->
<div class="cart-bar-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-9 col-lg-6">
                <div class="cart-bar">
                    <div (click)="orderPurchase()" class="btn-cart d-flex justify-content-center align-items-center px-3">
                        <span>Checkout</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
